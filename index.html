<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Landing Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            padding: 60px;
            text-align: center;
            background: #f4f4f4;
        }

        .hero h1 {
            font-size: 40px;
        }

        .hero button {
            padding: 10px 20px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        .section {
            padding: 40px;
            text-align: center;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>My Docker project</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    <h1>Welcome to Our Docker project</h1>
    <p>This tells you completely about DevOps.</p>
    <button>Get Started</button>
</div>

<div class="section">
    <h2>About Us</h2>
    <p>It is Development + Operations.</p>
</div>

<div class="section">
    <h2>Our Services</h2>
    <p>It will deal with docker,cloud services etc.</p>
</div>

<footer>
    <p>© 2026 My Docker project | All Rights Reserved</p>
</footer>

</body>
</html>
